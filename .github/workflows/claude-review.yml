name: Claude PR Review

# Automated review by Claude Sonnet on every PR to main (~$0.50–1/PR budget).
# DORMANT until the repo secret ANTHROPIC_API_KEY is set (the job no-ops without it),
# so merging this workflow incurs no cost on its own. See CONTRIBUTING.md § Review bot.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Fast no-op on main so the job name appears in branch-protection settings
  # (pull_request-only workflows otherwise never register on the default branch).
  push:
    branches: [main]

# Don't stack reviews: a new push cancels the in-flight review for the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Register check on main push
        if: github.event_name == 'push'
        run: |
          echo "Full Claude review runs on pull_request only."
          echo "This step registers the job name on main for branch protection."

      - name: Check for API key
        if: github.event_name == 'pull_request'
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping Claude review. Add the repo secret to enable."
          fi

      - name: Checkout
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build bounded review context
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        run: |
          python3 scripts/build_claude_review_context.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --out-dir review-context

      - name: Claude Sonnet review
        id: claude
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        timeout-minutes: 12
        # Advisory gate: the operator's approval is the hard merge gate (branch
        # protection), so a bot infra hiccup (turn cap, transient API error)
        # must not red-X the PR and block the human. Real review feedback is
        # posted as PR comments regardless of this step's exit code.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            COST BUDGET: Finish in ≤10 turns. Start with `gh pr view` and `gh pr diff`.

            BOUNDED CONTEXT (read this before reviewing):
            Open `review-context/MANIFEST.md` — it lists every file you are allowed to
            read besides the PR metadata. Those files are materialized under
            `review-context/` (PR diff paths + paired tests + the review rubric).
            Use the Read tool ONLY on paths under `review-context/`. Do NOT grep,
            find, list directories, or read any other repo path.

            Rubric (A–F):
            A. PR description — What, Motivation, E2E evidence, Backward compat + proof, Checklist
            B. Backward compatibility — additive / feature-flagged; breaking changes need proof
            C. BHAGA invariants — Decimal money, America/Chicago, GCS-not-laptop, staging guards
            D. Testing — prod-like sandbox e2e or justified gap; meaningful coverage on new code
            E. Security — no secrets/PII in diff
            F. Docs lock-step — coupled docs updated when code changed

            Output:
            - Inline comments on exact diff lines for real issues only (confirmed: true).
            - One `gh pr comment` summary: verdict (APPROVE / COMMENT / REQUEST CHANGES) +
              ✅/⚠️/❌ checklist for A–F.
            Do not modify code. No chat reply — GitHub comments only.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 12
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob(review-context/**)"

      - name: Post review cost stats
        if: github.event_name == 'pull_request' && always() && steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/post_claude_review_cost.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --execution-file "${{ steps.claude.outputs.execution_file }}" \
            --default-model claude-sonnet-4-6 \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo "${{ github.repository }}"
