name: Claude PR Review

# Automated review by Claude Opus (medium thinking) on every PR to main (~$2–4/PR budget).
# DORMANT until the repo secret ANTHROPIC_API_KEY is set (the job no-ops without it),
# so merging this workflow incurs no cost on its own. See CONTRIBUTING.md § Review bot.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Fast no-op on main so the job name appears in branch-protection settings
  # (pull_request-only workflows otherwise never register on the default branch).
  push:
    branches: [main]

# Don't stack reviews: a new push cancels the in-flight review for the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Register check on main push
        if: github.event_name == 'push'
        run: |
          echo "Full Claude review runs on pull_request only."
          echo "This step registers the job name on main for branch protection."

      - name: Check for API key
        if: github.event_name == 'pull_request'
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping Claude review. Add the repo secret to enable."
          fi

      - name: Checkout
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build bounded review context
        if: >
          github.event_name == 'pull_request' &&
          steps.gate.outputs.enabled == 'true'
        run: |
          python3 scripts/build_claude_review_context.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --prev-head "${{ github.event.before }}" \
            --out-dir review-context

      - name: Claude Opus review (medium thinking)
        id: claude
        if: >
          github.event_name == 'pull_request' &&
          steps.gate.outputs.enabled == 'true'
        timeout-minutes: 20
        # continue-on-error here isolates Claude's infra from the verdict gate.
        # A bot hiccup (turn cap, API error) → execution file missing → caught
        # by "Verify Claude review ran" step. The actual REQUEST CHANGES verdict
        # is enforced by the "Gate on Claude verdict" step below.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            COST BUDGET: Finish in ≤12 turns. Start with `gh pr view` and `gh pr diff`.

            BOUNDED CONTEXT (read this before reviewing):
            Open `review-context/MANIFEST.md` — it lists every file you are allowed to
            read besides the PR metadata. Those files are materialized under
            `review-context/` (PR diff paths + paired tests + the review rubric).
            Use the Read tool ONLY on paths under `review-context/`. Do NOT grep,
            find, list directories, or read any other repo path.

            Rubric (A–F):
            A. PR description — What, Motivation, Design/Approach, E2E evidence, Backward compat + proof, Checklist
            B. Backward compatibility — additive / feature-flagged; breaking changes need proof
            C. BHAGA invariants — Decimal money, America/Chicago, GCS-not-laptop, staging guards
            D. Testing — prod-like sandbox e2e or justified gap; meaningful coverage on new code
            E. Security — no secrets/PII in diff
            F. Docs lock-step — coupled docs updated when code changed

            EVIDENCE CONFIDENCE RATING (required for every PR):
            After reading the §4 End-to-end test section in the PR description, perform
            this analysis and include it in your summary comment:

            1. List what the evidence PROVES (specific behaviors verified with real output).
            2. List what the evidence does NOT prove (new code paths with no real execution proof).
            3. Assign a confidence score 0–100% for "will this change work correctly in production?"
               - 100% = real prod/sandbox execution output covering all changed code paths.
               - 80–99% = unit tests + strong structural argument + minor uncovered paths.
               - 50–79% = unit tests only, or evidence covers only the happy path.
               - <50% = no meaningful evidence, or evidence is contradicted by findings.
            4. If confidence < 100%: list 1–3 specific commands the author could run to close
               the gap (e.g. exact gcloud/pytest/BQ commands with expected output shape).
               These go under "Evidence gaps (suggested additional collection)" in the summary.
            5. Confidence < 95% on §4 is a BLOCKING finding: REQUEST CHANGES and require
               the additional evidence before merge. Note: a separate CI step parses
               the numeric score directly from your summary comment and fails if below
               95 — write the score accurately.

            SEVERITY POLICY (converge — do NOT nitpick-loop):
            Classify every finding as BLOCKING or OPTIONAL.
            - BLOCKING = a confirmed correctness bug, security/PII leak, data-loss,
              broken or missing test for new behavior, BHAGA-invariant violation,
              an unproven backward-incompatible change, OR evidence confidence < 95%.
              These are the ONLY things you may post as inline comments.
            - OPTIONAL = style, naming, "consider", extra-robustness/escape-hatches,
              "you could also test X" on already-tested code, refactors, subjective
              preferences. NEVER post these as inline comments. List them — at most 5,
              terse — in the summary under a "Optional (non-blocking)" heading.
            Convergence rules:
            - If MANIFEST.md marks this a RE-REVIEW, review ONLY the changed-since-last
              files and do NOT re-raise anything from earlier rounds.
            - Do NOT invent new OPTIONAL findings on code that already exists and works.
            - If there are zero BLOCKING issues, the verdict MUST be APPROVE (optional
              suggestions never warrant COMMENT or REQUEST CHANGES).

            Output:
            - Inline comments ONLY for BLOCKING issues (confirmed: true). If there are
              none, post NO inline comments.
            - One `gh pr comment` summary with:
              • verdict (APPROVE / COMMENT / REQUEST CHANGES)
              • ✅/⚠️/❌ checklist for A–F
              • Evidence confidence rating: X% — what it proves / what it doesn't
              • Evidence gaps (suggested additional collection) — if confidence < 100%
              • Optional (non-blocking) — at most 5 items
            Do not modify code. No chat reply — GitHub comments only.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 14
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob(review-context/**)"

      - name: Post review cost stats
        if: >
          github.event_name == 'pull_request' &&
          steps.gate.outputs.enabled == 'true' &&
          always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          extra=()
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD -- \
              .github/workflows/claude-review.yml | grep -q .; then
            extra+=(--skip-reason bootstrap_workflow)
          fi
          python3 scripts/post_claude_review_cost.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --execution-file "${{ steps.claude.outputs.execution_file }}" \
            --default-model claude-opus-4-8 \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            "${extra[@]}"

      - name: Verify Claude review ran
        if: >
          github.event_name == 'pull_request' &&
          steps.gate.outputs.enabled == 'true'
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
            echo "Claude review produced an execution file."
            exit 0
          fi
          if git diff --name-only "$BASE_SHA" HEAD -- .github/workflows/claude-review.yml | grep -q .; then
            echo "::warning::Claude review skipped — claude-review.yml differs from main (workflow bootstrap). Cost comment explains; merge this PR, then the next PR gets a real review."
            exit 0
          fi
          echo "::error::Claude review did not run (no execution file) and claude-review.yml was not changed — unexpected failure."
          exit 1

      - name: Gate on Claude verdict (fail if REQUEST CHANGES)
        if: >
          github.event_name == 'pull_request' &&
          steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch the most recent claude[bot] summary comment and check the verdict.
          # Fails if Claude posted REQUEST CHANGES — agent must fix + re-push.
          # Passes silently if no Claude comment found (infra hiccup already caught above).
          python3 - <<'PYEOF'
          import json, subprocess, sys, re

          result = subprocess.run(
              ["gh", "api", f"repos/${{ github.repository }}/issues/$PR_NUMBER/comments",
               "--jq", '[.[] | select(.user.login == "claude[bot]" or (.user.login | startswith("claude")))]'],
              capture_output=True, text=True
          )
          if result.returncode != 0 or not result.stdout.strip():
              print("No Claude comments found — skipping verdict check.")
              sys.exit(0)

          comments = json.loads(result.stdout)
          if not comments:
              print("No Claude summary comment found — skipping verdict check.")
              sys.exit(0)

          latest = comments[-1]["body"]
          first_lines = "\n".join(latest.splitlines()[:3]).upper()

          if "REQUEST CHANGES" in first_lines:
              print("::error::Claude review verdict: REQUEST CHANGES — blocking issues must be addressed before merge.")
              print("Fix the issues, reply to each inline thread with 'fixed in <sha>', then push.")
              sys.exit(1)

          if "APPROVE" in first_lines:
              print("Claude review verdict: APPROVE — no blocking issues.")
              sys.exit(0)

          print(f"Claude verdict unclear from comment header. First lines:\n{first_lines}\nAllowing (non-blocking).")
          PYEOF

      - name: Evidence confidence gate (fail if < 95%)
        if: >
          github.event_name == 'pull_request' &&
          steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY="$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments \
            --jq '[.[] | select(.user.login == "claude[bot]" or (.user.login | startswith("claude")))] | last | .body' \
            2>/dev/null || echo '')"
          if [ -z "$BODY" ] || [ "$BODY" = "null" ]; then
            echo "No Claude comment found — skipping evidence confidence check."
            exit 0
          fi
          printf '%s' "$BODY" | python3 scripts/check_evidence_confidence.py --min 95

      - name: Check all inline review threads are replied to
        if: >
          github.event_name == 'pull_request' &&
          steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/check_pr_review_replies.py \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"
