name: Claude PR Review

# Automated review by Claude Opus on every PR to main.
# DORMANT until the repo secret ANTHROPIC_API_KEY is set (the job no-ops without it),
# so merging this workflow incurs no cost on its own. See CONTRIBUTING.md § Review bot.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Don't stack reviews: a new push cancels the in-flight review for the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Check for API key
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping Claude review. Add the repo secret to enable."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Opus review
        if: steps.gate.outputs.enabled == 'true'
        # Advisory gate: the operator's approval is the hard merge gate (branch
        # protection), so a bot infra hiccup (turn cap, transient API error)
        # must not red-X the PR and block the human. Real review feedback is
        # posted as PR comments regardless of this step's exit code.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the required reviewer for this repository. Review this pull request
            STRICTLY against the rubric in .github/claude-review-guidelines.md (read that
            file first — it defines exactly what to check: PR-description completeness,
            backward compatibility + proof, BHAGA correctness invariants, testing, security,
            and docs lock-step).

            The PR branch is already checked out in the working directory. Use `gh pr diff`
            and `gh pr view` to inspect the change and its description.

            Output:
            - Inline comments on the exact diff lines where real issues occur, via
              mcp__github_inline_comment__create_inline_comment (with confirmed: true).
            - One top-level summary via `gh pr comment` that starts with a verdict line
              (APPROVE / COMMENT / REQUEST CHANGES) followed by a ✅/⚠️/❌ checklist of
              rubric sections A–F.
            Only post GitHub comments — do not return the review as a chat message. Do not
            modify code. Flag real issues only; skip pure style nits.
          claude_args: |
            --model opus
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
