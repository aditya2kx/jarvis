name: Claude PR Review

# Automated review by Claude Sonnet on every PR to main (~$0.50–1/PR budget).
# DORMANT until the repo secret ANTHROPIC_API_KEY is set (the job no-ops without it),
# so merging this workflow incurs no cost on its own. See CONTRIBUTING.md § Review bot.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Don't stack reviews: a new push cancels the in-flight review for the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Check for API key
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping Claude review. Add the repo secret to enable."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Sonnet review
        if: steps.gate.outputs.enabled == 'true'
        timeout-minutes: 12
        # Advisory gate: the operator's approval is the hard merge gate (branch
        # protection), so a bot infra hiccup (turn cap, transient API error)
        # must not red-X the PR and block the human. Real review feedback is
        # posted as PR comments regardless of this step's exit code.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            COST BUDGET: Finish in ≤8 turns. Use ONLY `gh pr view` and `gh pr diff`.
            Do NOT grep/find the repo, list directories, or open files unless the diff
            hunk is unreadable without ≤30 lines of that one file.

            Review this PR against the rubric below. Read
            `.github/claude-review-guidelines.md` only if a section needs detail.

            Rubric (A–F):
            A. PR description — What, Motivation, E2E evidence, Backward compat + proof, Checklist
            B. Backward compatibility — additive / feature-flagged; breaking changes need proof
            C. BHAGA invariants — Decimal money, America/Chicago, GCS-not-laptop, staging guards
            D. Testing — prod-like sandbox e2e or justified gap; meaningful coverage on new code
            E. Security — no secrets/PII in diff
            F. Docs lock-step — coupled docs updated when code changed

            Output:
            - Inline comments on exact diff lines for real issues only (confirmed: true).
            - One `gh pr comment` summary: verdict (APPROVE / COMMENT / REQUEST CHANGES) +
              ✅/⚠️/❌ checklist for A–F.
            Do not modify code. No chat reply — GitHub comments only.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 10
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
