name: Claude PR Review

# Automated review by Claude Sonnet on every PR to main (~$0.50–1/PR budget).
# DORMANT until the repo secret ANTHROPIC_API_KEY is set (the job no-ops without it),
# so merging this workflow incurs no cost on its own. See CONTRIBUTING.md § Review bot.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Fast no-op on main so the job name appears in branch-protection settings
  # (pull_request-only workflows otherwise never register on the default branch).
  push:
    branches: [main]

# Don't stack reviews: a new push cancels the in-flight review for the same PR.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Register check on main push
        if: github.event_name == 'push'
        run: |
          echo "Full Claude review runs on pull_request only."
          echo "This step registers the job name on main for branch protection."

      - name: Check for API key
        if: github.event_name == 'pull_request'
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping Claude review. Add the repo secret to enable."
          fi

      - name: Checkout
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build bounded review context
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        run: |
          python3 scripts/build_claude_review_context.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --prev-head "${{ github.event.before }}" \
            --out-dir review-context

      - name: Claude Sonnet review
        id: claude
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        timeout-minutes: 12
        # Advisory gate: the operator's approval is the hard merge gate (branch
        # protection), so a bot infra hiccup (turn cap, transient API error)
        # must not red-X the PR and block the human. Real review feedback is
        # posted as PR comments regardless of this step's exit code.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            COST BUDGET: Finish in ≤10 turns. Start with `gh pr view` and `gh pr diff`.

            BOUNDED CONTEXT (read this before reviewing):
            Open `review-context/MANIFEST.md` — it lists every file you are allowed to
            read besides the PR metadata. Those files are materialized under
            `review-context/` (PR diff paths + paired tests + the review rubric).
            Use the Read tool ONLY on paths under `review-context/`. Do NOT grep,
            find, list directories, or read any other repo path.

            Rubric (A–F):
            A. PR description — What, Motivation, E2E evidence, Backward compat + proof, Checklist
            B. Backward compatibility — additive / feature-flagged; breaking changes need proof
            C. BHAGA invariants — Decimal money, America/Chicago, GCS-not-laptop, staging guards
            D. Testing — prod-like sandbox e2e or justified gap; meaningful coverage on new code
            E. Security — no secrets/PII in diff
            F. Docs lock-step — coupled docs updated when code changed

            SEVERITY POLICY (converge — do NOT nitpick-loop):
            Classify every finding as BLOCKING or OPTIONAL.
            - BLOCKING = a confirmed correctness bug, security/PII leak, data-loss,
              broken or missing test for new behavior, BHAGA-invariant violation, or
              an unproven backward-incompatible change. These are the ONLY things you
              may post as inline comments.
            - OPTIONAL = style, naming, "consider", extra-robustness/escape-hatches,
              "you could also test X" on already-tested code, refactors, subjective
              preferences. NEVER post these as inline comments. List them — at most 5,
              terse — in the summary under a "Optional (non-blocking)" heading.
            Convergence rules:
            - If MANIFEST.md marks this a RE-REVIEW, review ONLY the changed-since-last
              files and do NOT re-raise anything from earlier rounds.
            - Do NOT invent new OPTIONAL findings on code that already exists and works.
            - If there are zero BLOCKING issues, the verdict MUST be APPROVE (optional
              suggestions never warrant COMMENT or REQUEST CHANGES).

            Output:
            - Inline comments ONLY for BLOCKING issues (confirmed: true). If there are
              none, post NO inline comments.
            - One `gh pr comment` summary: verdict (APPROVE / COMMENT / REQUEST CHANGES)
              + ✅/⚠️/❌ checklist for A–F + an "Optional (non-blocking)" list if any.
            Do not modify code. No chat reply — GitHub comments only.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 12
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob(review-context/**)"

      - name: Post review cost stats
        if: github.event_name == 'pull_request' && always() && steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          extra=()
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD -- \
              .github/workflows/claude-review.yml | grep -q .; then
            extra+=(--skip-reason bootstrap_workflow)
          fi
          python3 scripts/post_claude_review_cost.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --execution-file "${{ steps.claude.outputs.execution_file }}" \
            --default-model claude-sonnet-4-6 \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            "${extra[@]}"

      - name: Verify Claude review ran
        if: github.event_name == 'pull_request' && steps.gate.outputs.enabled == 'true'
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
            echo "Claude review produced an execution file."
            exit 0
          fi
          if git diff --name-only "$BASE_SHA" HEAD -- .github/workflows/claude-review.yml | grep -q .; then
            echo "::warning::Claude review skipped — claude-review.yml differs from main (workflow bootstrap). Cost comment explains; merge this PR, then the next PR gets a real review."
            exit 0
          fi
          echo "::error::Claude review did not run (no execution file) and claude-review.yml was not changed — unexpected failure."
          exit 1
