name: Build and Deploy BHAGA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'Container SHA to rollback to (leave empty for normal deploy)'
        required: false
        type: string

env:
  PROJECT_ID: jarvis-bhaga-prod
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/jarvis-bhaga-prod/jarvis-images

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build orchestrator image
        run: |
          docker build -t ${{ env.REGISTRY }}/bhaga-orchestrator:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/bhaga-orchestrator:latest .

      - name: Build webhook image
        run: |
          # Context = repo root so Dockerfile can COPY skills/plaid_api (Issue #158).
          docker build -t ${{ env.REGISTRY }}/bhaga-webhook:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/bhaga-webhook:latest \
                       -f cloud/webhook/Dockerfile .

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/bhaga-orchestrator:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/bhaga-orchestrator:latest
          docker push ${{ env.REGISTRY }}/bhaga-webhook:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/bhaga-webhook:latest

      - name: Deploy orchestrator (Cloud Run Job)
        if: ${{ !inputs.rollback_sha }}
        run: |
          # --update-env-vars is additive (only touches the named keys), so the
          # manually-set prod env (BHAGA_SECRETS_BACKEND, GCP_PROJECT, …) is
          # preserved. BHAGA_SESSION_PERSIST=1 keeps Square's trusted-device
          # storage_state in GCS so prod stops re-prompting magic link / 2FA
          # every night (it was previously set for sandbox runs only). Codified
          # here so it survives a job recreate-from-scratch, not just a manual
          # `gcloud run jobs update`.
          # --memory 4Gi: a device-blocked Square retry launches Chromium twice
          # in one run; at 2Gi this OOM-killed the container mid-pipeline
          # (2026-06-11). 4Gi (with 2 vCPU) stays well under the Cloud Run jobs
          # free tier. Codified here so it survives a recreate-from-scratch.
          gcloud run jobs update bhaga-daily-refresh \
            --image ${{ env.REGISTRY }}/bhaga-orchestrator:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --memory 4Gi \
            --update-env-vars BHAGA_SESSION_PERSIST=1,BHAGA_DATASTORE=bigquery

      - name: Deploy webhook (Cloud Run Service)
        if: ${{ !inputs.rollback_sha }}
        run: |
          # --cpu-boost gives 2x vCPU only during instance startup ($0 extra
          # cost, min-instances stays 0) — mitigates the cold-start
          # operation_timeout Slack sees on the first /bhaga-cloud command
          # after idle (init_app() eagerly builds Firestore+BigQuery clients
          # on import, which can exceed Slack's 3s ack deadline on a cold
          # start). Persists across rollback (line below doesn't reset it —
          # `gcloud run services update` only touches explicitly-passed
          # flags, so a rollback keeps whatever the last full deploy set).
          gcloud run services update bhaga-webhook \
            --image ${{ env.REGISTRY }}/bhaga-webhook:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --no-cpu-throttling \
            --memory 512Mi \
            --cpu-boost \
            --update-env-vars PLAID_ENV=sandbox,PLAID_DEFAULT_STORE=palmetto \
            --update-secrets PLAID_CLIENT_ID=plaid_client_id:latest,PLAID_SECRET=plaid_secret:latest

      # Apply pending BQ migrations from core/migrations/ before recording the
      # deploy. Idempotent — no-op when already applied. Keeps schema in sync
      # with the merged code + Grafana panels that reference new columns/views.
      - name: Apply BQ schema migrations
        if: ${{ !inputs.rollback_sha }}
        run: |
          pip install --quiet google-cloud-bigquery google-auth
          BHAGA_DATASTORE=bigquery python3 -c \
            "from core.datastore import ensure_schema; applied = ensure_schema(); print('applied:', applied or 'none')"

      # Recompute dual-date order reco after schema so Operator Console
      # /inventory shows correct date-bound columns immediately (not next nightly).
      - name: Refresh order reco (prod inventory)
        if: ${{ !inputs.rollback_sha }}
        run: |
          pip install --quiet google-cloud-bigquery google-auth
          BHAGA_DATASTORE=bigquery python3 -c \
            "from core.order_reco import refresh_order_reco; refresh_order_reco('palmetto'); print('refresh_order_reco: ok store=palmetto')" \
            || echo "::warning::refresh_order_reco failed (non-fatal) — Operator Console /inventory may stay stale until nightly or page self-heal"

      # Auto-rerun the nightly for any dates the merged PR declares it fixes, via
      # a "Retry-Dates: YYYY-MM-DD[, ...]" trailer in the PR body. Each date runs
      # SMART (scripts/trigger_dated_refresh.py): already-covered dates are
      # recompute-only (no portal login/OTP); uncovered dates do a full scrape.
      # Per-execution env overrides only — the job definition is never mutated.
      # Best-effort: a failure here never fails the deploy (operator can retrigger).
      # IAM: the WIF SA needs run.jobs.run (roles/run.developer covers this).
      - name: Auto-rerun fixed dates (Retry-Dates trailer)
        if: ${{ !inputs.rollback_sha }}
        env:
          GH_TOKEN: ${{ github.token }}
          GCP_PROJECT: ${{ env.PROJECT_ID }}
          BHAGA_REGION: ${{ env.REGION }}
        run: |
          pip install --quiet google-cloud-bigquery google-cloud-run google-auth
          BODY="$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
                   --jq '.[0].body' 2>/dev/null || echo '')"
          DATES="$(printf '%s\n' "$BODY" \
                   | sed -n 's/^[[:space:]]*[Rr]etry-[Dd]ates:[[:space:]]*//p' \
                   | tr ',' '\n' | tr -d ' ' \
                   | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' || true)"
          if [ -z "$DATES" ]; then
            echo "No Retry-Dates trailer found — nothing to rerun."
            exit 0
          fi
          for d in $DATES; do
            echo "::group::Rerun $d"
            python3 scripts/trigger_dated_refresh.py --date "$d" \
              || echo "::warning::trigger_dated_refresh failed for $d (non-fatal)"
            echo "::endgroup::"
          done

      - name: Rollback (if SHA provided)
        if: ${{ inputs.rollback_sha }}
        run: |
          gcloud run jobs update bhaga-daily-refresh \
            --image ${{ env.REGISTRY }}/bhaga-orchestrator:${{ inputs.rollback_sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}
          gcloud run services update bhaga-webhook \
            --image ${{ env.REGISTRY }}/bhaga-webhook:${{ inputs.rollback_sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

      # Runs only when the preceding deploy/rollback steps succeeded — a
      # failed build must NOT record a deploy row.
      - name: Record deploy events (BQ + Grafana annotation)
        env:
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAFANA_ORG_SLUG: ${{ secrets.GRAFANA_ORG_SLUG }}
        run: |
          pip install --quiet google-cloud-bigquery google-auth
          KIND=$( [[ -n "${{ inputs.rollback_sha }}" ]] && echo rollback || echo deploy )
          for unit in orchestrator webhook; do
            python3 scripts/deploy_events.py record \
              --agent bhaga \
              --unit "$unit" \
              --sha "${{ github.sha }}" \
              --kind "$KIND" \
              --actor "${{ github.actor }}" \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "[deploy_events] WARNING: record failed for $unit (non-fatal)"
          done
