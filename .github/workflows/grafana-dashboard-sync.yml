name: Sync BHAGA Grafana Dashboard

on:
  push:
    branches: [main]
    paths:
      - "agents/bhaga/grafana/**"
  workflow_dispatch:
    inputs:
      create_sa:
        description: "Also create/update the read-only BQ SA (first-time setup)"
        required: false
        type: boolean
        default: false

env:
  PROJECT_ID: jarvis-bhaga-prod
  REGION: us-central1
  # Required GitHub secrets: GRAFANA_API_TOKEN, GRAFANA_ORG_SLUG

jobs:
  sync-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-cloud-bigquery google-auth google-auth-httplib2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Create/update read-only BQ SA (first-time only)
        if: ${{ inputs.create_sa == true }}
        env:
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAFANA_ORG_SLUG: ${{ secrets.GRAFANA_ORG_SLUG }}
        run: |
          python3 agents/bhaga/grafana/deploy.py --create-sa --datasource-only

      - name: Sync dashboard to Grafana Cloud
        env:
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAFANA_ORG_SLUG: ${{ secrets.GRAFANA_ORG_SLUG }}
        run: |
          python3 agents/bhaga/grafana/deploy.py
