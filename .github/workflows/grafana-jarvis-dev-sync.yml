name: Sync Jarvis Development Grafana Dashboard

on:
  push:
    branches: [main]
    paths: ["grafana/jarvis_dev/**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    name: Sync Jarvis Development dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests google-cloud-bigquery google-auth

      - name: Sync Jarvis Development dashboard
        env:
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAFANA_ORG_SLUG: ${{ secrets.GRAFANA_ORG_SLUG }}
        run: python3 grafana/jarvis_dev/deploy.py
