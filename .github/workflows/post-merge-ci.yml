name: Post-merge CI

# Runs Claude review + sandbox e2e on the merged code immediately after a PR
# lands on main. This is a safety-net validation layer: even if pre-merge CI
# was green, a post-merge run catches edge-cases introduced by concurrent merges
# or subtle merge-commit mutations.
#
# Both jobs post their results as comments on the merged PR so the babysit loop
# can inspect them with `gh run list --workflow=post-merge-ci.yml`.
#
# Claude review here is a light post-merge audit (not a blocking REQUEST CHANGES):
# the verdict is INFORMATIONAL — it cannot reopen or revert the merge, but any
# BLOCKING findings are posted as a comment for follow-up.
#
# The sandbox e2e runs against the merged main (source: prod-raw, last closed
# period) and posts the same evidence comment as the pre-merge run. It FAILS
# the workflow if the pipeline regresses so the babysit loop notices.

on:
  pull_request:
    types: [closed]

# One run per PR; don't stack post-merge runs for the same PR.
concurrency:
  group: post-merge-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # ── Post-merge sandbox e2e ─────────────────────────────────────────────────
  sandbox-e2e:
    name: Post-merge sandbox e2e
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      BHAGA_SECRETS_BACKEND: gcp
      BHAGA_STATE_BACKEND: firestore

    steps:
      - name: Require sandbox e2e enabled (fail-fast)
        env:
          SANDBOX_E2E_ENABLED: ${{ vars.SANDBOX_E2E_ENABLED }}
        run: |
          if [ "$SANDBOX_E2E_ENABLED" != "true" ]; then
            echo "::warning::SANDBOX_E2E_ENABLED is not 'true' — post-merge sandbox e2e skipped."
            echo "Set repo variable SANDBOX_E2E_ENABLED=true to enable (see CONTRIBUTING §4 / RUNBOOK §13)."
            exit 0
          fi
          echo "sandbox e2e enabled — proceeding."

      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SANDBOX_E2E_SERVICE_ACCOUNT || secrets.WIF_SERVICE_ACCOUNT }}

      - name: Run post-merge sandbox e2e (prod-raw, last closed period, zero-OTP)
        run: |
          python3 -m agents.bhaga.scripts.sandbox_e2e \
            --pr-number "${{ github.event.pull_request.number }}" \
            --source prod-raw --period last-closed \
            --evidence-file sandbox-e2e-evidence.md

      - name: Post evidence comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### BHAGA post-merge sandbox e2e\n_(no evidence file produced — see job logs)_';
            try { body = fs.readFileSync('sandbox-e2e-evidence.md', 'utf8'); } catch (e) {}
            const status = '${{ job.status }}';
            body = `### Post-merge sandbox e2e — PR #${{ github.event.pull_request.number }}\n\n` + body;
            body += `\n\n_post-merge job status: **${status}**_`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body,
            });

  # ── Post-merge Claude review ───────────────────────────────────────────────
  claude-review:
    name: Post-merge Claude review
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Check for API key
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — skipping post-merge Claude review."
          fi

      - name: Checkout main
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Build bounded review context
        if: steps.gate.outputs.enabled == 'true'
        run: |
          python3 scripts/build_claude_review_context.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.merge_commit_sha }}" \
            --out-dir review-context

      - name: Post-merge Claude audit
        id: claude
        if: steps.gate.outputs.enabled == 'true'
        timeout-minutes: 10
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            MODE: POST-MERGE AUDIT (informational — PR is already merged)

            COST BUDGET: Finish in ≤8 turns. Start with `gh pr view` and `gh pr diff`.

            BOUNDED CONTEXT:
            Open `review-context/MANIFEST.md` — it lists every file you may read.
            Use the Read tool ONLY on paths under `review-context/`.

            This is a post-merge audit. Your verdict is INFORMATIONAL — the PR
            is already merged and cannot be reopened by this check.

            Rubric (A–F): same as pre-merge Claude review (BHAGA invariants,
            Decimal money, America/Chicago, GCS-not-laptop, staging guards, docs).

            Post one `gh pr comment` summary tagged "[post-merge audit]":
            - List any BLOCKING-severity findings you would have blocked the PR for.
            - If none, post a brief green summary.
            - Do NOT post inline comments (PR is merged; threads are noise).
            Do not modify code. No chat reply — GitHub comment only.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 10
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob(review-context/**)"

      - name: Post review cost stats
        if: always() && steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/post_claude_review_cost.py \
            --pr-number "${{ github.event.pull_request.number }}" \
            --execution-file "${{ steps.claude.outputs.execution_file }}" \
            --default-model claude-sonnet-4-6 \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo "${{ github.repository }}" || true
