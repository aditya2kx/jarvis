name: PR cost finalize (post-merge)

# Post-merge: capture any final review costs and post the cost analysis comment.
#
# NOTE: This workflow no longer commits to main. The cost ledger is committed to
# the PR branch before merge by pr-cost-gate.yml (on every push), so it lands
# in the squash merge automatically. The direct push-to-main was removed because
# the repo ruleset (enforcement: active, bypass_actors: []) blocks all direct
# pushes, including from ADMIN_PAT.
#
# What this still does:
#  - Finalises the review cost record from any late-posted cost comments.
#  - Regenerates the HTML report on the runner (ephemeral, not committed).
#  - Posts a post-merge cost analysis comment to the PR thread.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-cost-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    name: Finalize cost record
    # Only on real merges, not closed-without-merge.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Finalize review cost from posted comments
        run: |
          python3 scripts/pr_cost_ledger.py set-meta --pr "$PR" \
            --title "${{ github.event.pull_request.title }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --created "${{ github.event.pull_request.created_at }}" \
            --merged "${{ github.event.pull_request.merged_at }}" || true
          python3 scripts/pr_cost_ledger.py capture-review --pr "$PR" --repo "$REPO" || \
            echo "::notice::capture-review found no cost comments to reconcile."

      - name: Regenerate HTML cost report
        run: python3 scripts/pr_cost_ledger.py report

      - name: Post post-merge cost analysis comment
        run: |
          {
            echo "### Post-merge cost analysis — PR #$PR"
            echo ""
            echo '```'
            python3 scripts/pr_cost_ledger.py analyze --pr "$PR"
            echo '```'
            echo ""
            echo "_Full breakdown: \`metrics/pr_cost/PR-$PR.json\` · team report: \`metrics/pr_cost/report.html\`._"
          } > /tmp/cost_analysis.md
          gh pr comment "$PR" --body-file /tmp/cost_analysis.md || \
            echo "::warning::Could not post analysis comment."
