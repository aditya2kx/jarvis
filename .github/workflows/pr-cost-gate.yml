name: PR cost gate

# Hard pre-merge gate (requirement #7): a PR may not merge until its cost is
# accounted for in the in-repo ledger (metrics/pr_cost/PR-<n>.json) — including
# the Cursor BUILD cost, which has no per-PR API for individual accounts and so
# must be recorded from the dashboard and committed.
#
# This is a PURE VALIDATOR — it never writes to the repo. The cost ledger is
# kept current and committed by the author's own commits via the pre-commit hook
# (scripts/git-hooks/pre-commit → pr_cost_ledger.py sync, auto-staged). That is
# the design the ledger script itself documents: "the operator commits the
# complete record once." An earlier version committed the ledger back to the PR
# branch from CI; that forced a second commit per push, which either suppressed
# CI (GITHUB_TOKEN) or duplicated every check + churned via cancel-in-progress
# (ADMIN_PAT). Validating only — no bot commit — removes that entire class of bug.
#
# Make this a REQUIRED status check in branch protection to actually block merge
# (see CONTRIBUTING.md § Enabling enforcement).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Register the job name on main so branch protection can require it.
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cost-gate:
    name: PR cost gate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Register check on main push
        if: github.event_name == 'push'
        run: echo "Cost gate runs on pull_request only; this registers the check name on main."

      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Validate cost ledger (hard gate — requires build cost)
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/pr_cost_ledger.py validate \
            --pr "$PR" \
            --require-build
