name: PR cost gate

# Hard pre-merge gate: a PR may not merge until its cost is recorded in
# BigQuery (jarvis_dev dataset). The build cost must be non-zero. Review cost
# is optional at gate time (finalized post-merge by pr-cost-finalize.yml).
#
# This is a PURE VALIDATOR — it never writes. CI reads from BQ via WIF.
# Make this a REQUIRED status check in branch protection to enforce the gate.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Register the job name on main so branch protection can require it.
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  cost-gate:
    name: PR cost gate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Register check on main push
        if: github.event_name == 'push'
        run: echo "Cost gate runs on pull_request only; this registers the check name on main."

      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install BigQuery client
        if: github.event_name == 'pull_request'
        run: pip install google-cloud-bigquery google-auth

      - name: Authenticate to GCP
        if: github.event_name == 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Validate cost ledger (hard gate — requires build cost)
        if: github.event_name == 'pull_request'
        run: python3 scripts/pr_cost_ledger.py validate --pr "$PR" --require-build
