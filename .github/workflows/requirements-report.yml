name: Requirements HTML report

# Regenerate Playground/requirements_report.html whenever REQUIREMENTS.md changes
# and commit it back to the same branch (or directly to main when pushed there).

on:
  push:
    paths:
      - 'Playground/REQUIREMENTS.md'

permissions:
  contents: write

concurrency:
  group: requirements-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Regenerate requirements report
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Generate HTML report
        run: python3 scripts/requirements_tracker.py report

      - name: Commit updated report
        env:
          ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Playground/requirements_report.html
          if git diff --cached --quiet; then
            echo "Report unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "chore(reqs): regenerate requirements_report.html [skip ci]"
          # Use ADMIN_PAT when pushing to main (protected branch), fall back to
          # GITHUB_TOKEN for feature branches where the default token can push.
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ -n "$ADMIN_PAT" ]; then
            REMOTE_URL="https://x-access-token:${ADMIN_PAT}@github.com/${{ github.repository }}.git"
            git push "$REMOTE_URL" HEAD:main
          else
            git push
          fi
