name: Sandbox e2e

# Prod-like end-to-end on every PR against a PRE-CREATED sandbox sheet pool
# (never production workbooks). Reads the PROD raw Square+ADP sheets directly for
# the most-recent CLOSED pay period and writes them into the leased sandbox slot
# (read-prod / write-sandbox only) — no scrape, no browser, zero OTP. Verifies the
# full period builds incl. tip-pool conservation.
# Leases a pool slot via Firestore (collection sandbox_slots only).
# See RUNBOOK §13 and agents/bhaga/scripts/sandbox_pool.json.
#
# Skip policy: commits with message prefix "chore(cost):" are automatic cost-ledger
# commits from pr-cost-gate.yml. They contain no code changes — skip the full e2e
# to avoid wasting cloud resources (the job still reports success for branch protection).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# One run per PR; a new push cancels the previous (cost + no orphan sheets).
concurrency:
  group: sandbox-e2e-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  e2e:
    name: Sandbox e2e
    runs-on: ubuntu-latest
    env:
      BHAGA_SECRETS_BACKEND: gcp      # use ADC (the WIF service account) for Google APIs
      BHAGA_STATE_BACKEND: firestore   # slot leases only (sandbox_slots collection)
    steps:
      - name: Register check on main push
        if: github.event_name == 'push'
        run: |
          echo "Full sandbox e2e runs on pull_request (mandatory)."
          echo "This step registers the job name on main for branch protection."

      # Mandatory gate (no per-PR opt-out): if the prerequisite repo variable is
      # missing the check FAILS rather than silently skipping, so a green status
      # always means the e2e actually ran. SANDBOX_E2E_ENABLED + the WIF secrets
      # are an org/admin prerequisite (see CONTRIBUTING §4 / RUNBOOK §13), not a
      # PR-author switch — disabling the gate is a deliberate branch-protection
      # change, never an unset variable.
      - name: Require sandbox e2e enabled (fail-fast)
        if: github.event_name == 'pull_request'
        env:
          # Map through env (never interpolate ${{ }} directly into the shell) to
          # avoid a script-injection vector per GitHub's hardening guidance.
          SANDBOX_E2E_ENABLED: ${{ vars.SANDBOX_E2E_ENABLED }}
        run: |
          if [ "$SANDBOX_E2E_ENABLED" != "true" ]; then
            echo "::error::SANDBOX_E2E_ENABLED is not 'true' — the mandatory sandbox e2e gate cannot run."
            echo "Set repo variable SANDBOX_E2E_ENABLED=true and wire the WIF secrets (see CONTRIBUTING §4 / RUNBOOK §13)."
            exit 1
          fi
          echo "sandbox e2e enabled — proceeding."

      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'

      - name: Detect cost commit (skip heavy steps on automatic ledger commits)
        if: github.event_name == 'pull_request'
        id: costcheck
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Read the branch HEAD commit message, not the synthetic PR merge commit.
          MSG=$(git log -1 --format='%s' "$HEAD_SHA")
          echo "Head commit: $MSG"
          if [[ "$MSG" == "chore(cost):"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Cost-only commit detected — skipping sandbox e2e (no code changes)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: github.event_name == 'pull_request' && steps.costcheck.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: github.event_name == 'pull_request' && steps.costcheck.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        if: github.event_name == 'pull_request' && steps.costcheck.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SANDBOX_E2E_SERVICE_ACCOUNT || secrets.WIF_SERVICE_ACCOUNT }}

      - name: Run sandbox e2e (prod-raw, last closed period, zero-OTP)
        if: github.event_name == 'pull_request' && steps.costcheck.outputs.skip != 'true'
        run: |
          python3 -m agents.bhaga.scripts.sandbox_e2e \
            --pr-number "${{ github.event.number }}" \
            --source prod-raw --period last-closed \
            --evidence-file sandbox-e2e-evidence.md

      # always() so the evidence comment posts on FAILURE too (GitHub otherwise
      # skips post-failure steps). run_e2e writes the evidence file in its
      # finally block, so the file — incl. the `error:` line — exists on both
      # pass and fail, giving the PR author the diagnostic without digging logs.
      # Skipped on cost commits (no e2e ran, no evidence to post).
      - name: Post evidence comment
        if: github.event_name == 'pull_request' && steps.costcheck.outputs.skip != 'true' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### BHAGA sandbox e2e\n_(no evidence file produced — see job logs)_';
            try { body = fs.readFileSync('sandbox-e2e-evidence.md', 'utf8'); } catch (e) {}
            const status = '${{ job.status }}';
            body += `\n\n_job status: **${status}**_`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
