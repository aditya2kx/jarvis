name: Sandbox e2e

# Prod-like end-to-end against a PRE-CREATED sandbox sheet pool (never production
# workbooks). Reads the PROD raw Square+ADP sheets directly for the most-recent
# CLOSED pay period and writes them into the leased sandbox slot (read-prod /
# write-sandbox only) — no scrape, no browser, zero OTP.
#
# OPT-IN only — does NOT run on every PR by default.
# Trigger via:
#   1. Manual dispatch (workflow_dispatch) from the Actions tab.
#   2. Add the 'run-sandbox-e2e' label to a PR (re-trigger by synchronize/reopen).
# Going forward, run this only when a plan specifically calls for it.
# See RUNBOOK §13 and agents/bhaga/scripts/sandbox_pool.json.

on:
  workflow_dispatch: {}
  pull_request:
    types: [labeled, synchronize, reopened]

# One run per PR; a new push cancels the previous (cost + no orphan sheets).
concurrency:
  group: sandbox-e2e-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  e2e:
    name: Sandbox e2e
    runs-on: ubuntu-latest
    env:
      BHAGA_SECRETS_BACKEND: gcp      # use ADC (the WIF service account) for Google APIs
      BHAGA_STATE_BACKEND: firestore   # slot leases only (sandbox_slots collection)
    steps:
      # Require the 'run-sandbox-e2e' label when triggered by a PR event.
      # (workflow_dispatch bypasses this check — the dispatcher chose to run it.)
      - name: Check opt-in label (PR trigger)
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')
        run: |
          echo "Skipping sandbox e2e — the 'run-sandbox-e2e' label is not present on this PR."
          echo "Add the label to opt in, or trigger via workflow_dispatch from the Actions tab."
          exit 0

      - name: Require sandbox e2e enabled (fail-fast)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')
        env:
          SANDBOX_E2E_ENABLED: ${{ vars.SANDBOX_E2E_ENABLED }}
        run: |
          if [ "$SANDBOX_E2E_ENABLED" != "true" ]; then
            echo "::error::SANDBOX_E2E_ENABLED is not 'true' — the sandbox e2e cannot run."
            echo "Set repo variable SANDBOX_E2E_ENABLED=true and wire the WIF secrets (see CONTRIBUTING §4 / RUNBOOK §13)."
            exit 1
          fi
          echo "sandbox e2e enabled — proceeding."

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SANDBOX_E2E_SERVICE_ACCOUNT || secrets.WIF_SERVICE_ACCOUNT }}

      - name: Run sandbox e2e (prod-raw, last closed period, zero-OTP)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')
        run: |
          python3 -m agents.bhaga.scripts.sandbox_e2e \
            --pr-number "${{ github.event.number }}" \
            --source prod-raw --period last-closed \
            --evidence-file sandbox-e2e-evidence.md

      # always() so the evidence comment posts on FAILURE too.
      - name: Post evidence comment
        if: (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-sandbox-e2e')) && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### BHAGA sandbox e2e\n_(no evidence file produced — see job logs)_';
            try { body = fs.readFileSync('sandbox-e2e-evidence.md', 'utf8'); } catch (e) {}
            const status = '${{ job.status }}';
            body += `\n\n_job status: **${status}**_`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
