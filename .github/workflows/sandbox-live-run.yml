name: Sandbox live run

# Operator-triggered LIVE sandbox scrape: build the current ref's orchestrator
# image, deploy it to the bhaga-sandbox-refresh Cloud Run job, and run the REAL
# Square/ADP pipeline against a leased sandbox sheet pool slot — never prod.
#
# Unlike sandbox-e2e (replay-only, zero-OTP), this exercises a live browser +
# OTP, so it can reproduce selector-drift incidents (e.g. 2026-05-31 item sales)
# and PROVE a fix end-to-end on unmerged PR code.
#
# Isolation (hard invariant): reads prod data (GCS cache, raw sheets) but writes
# ONLY to sandbox targets — staging sheets, the sandbox GCS write bucket, and the
# sandbox Firestore collection. sandbox_live_run runs an isolation pre-flight that
# fails before any deploy/execute if an override is missing.
#
# OTP: the prod BHAGA cloud Slack bot DMs the operator; the prompt is labeled
# [SANDBOX · PR…] and the operator's READY/code reply resumes the SANDBOX job
# (sandbox has precedence in the webhook), never prod.

on:
  workflow_dispatch:
    inputs:
      refresh_date:
        description: 'Business date to reproduce (YYYY-MM-DD, CT)'
        required: true
        type: string
      pr_number:
        description: 'PR number (used to lease a stable sandbox pool slot)'
        required: true
        type: string
      pr_label:
        description: 'Short label shown in the sandbox OTP prompt (e.g. branch/PR title)'
        required: true
        type: string
      store:
        description: 'Store key'
        required: false
        default: 'palmetto'
        type: string
      execute:
        description: 'Execute the job (false = provision + deploy only, dry deploy)'
        required: false
        default: true
        type: boolean

concurrency:
  group: sandbox-live-run
  cancel-in-progress: false

env:
  PROJECT_ID: jarvis-bhaga-prod
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/jarvis-bhaga-prod/jarvis-images

permissions:
  contents: read
  id-token: write

jobs:
  live-run:
    name: Sandbox live run
    runs-on: ubuntu-latest
    env:
      BHAGA_SECRETS_BACKEND: gcp
      BHAGA_STATE_BACKEND: firestore
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build + push PR orchestrator image
        run: |
          IMAGE="${{ env.REGISTRY }}/bhaga-orchestrator:sandbox-${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy + run sandbox live job
        run: |
          python3 -m agents.bhaga.scripts.sandbox_live_run \
            --store "${{ inputs.store }}" \
            --pr-number "${{ inputs.pr_number }}" \
            --pr-label "${{ inputs.pr_label }}" \
            --refresh-date "${{ inputs.refresh_date }}" \
            --image "$IMAGE" \
            ${{ inputs.execute == false && '--no-execute' || '' }}
