portal: schwab
name: "Charles Schwab"
url: "https://client.schwab.com"
login_required: true
otp_method: "sms"
automated: true
documents:
  - type: "1099 Composite"
    nav_steps:
      - "Open the portal URL and sign in with username and password."
      - "Complete SMS OTP when prompted."
      - "Navigate to Accounts (or Statements & Tax Documents) and open Tax Documents / 1099 section."
      - "Select tax year {YYYY} from the year filter or dropdown."
      - "Locate the Composite 1099 for the account and download the PDF."
    expected_files:
      - "{YYYY} Form 1099 Composite - Schwab Acct {suffix}.pdf"
    drive_folder: "02 - Brokerage 1099s/{Broker}/"
    naming: "{YYYY} Form 1099 Composite - Schwab Acct {suffix}.pdf"
  - type: "Realized Gain/Loss CSV"
    nav_steps:
      - "After login (same session as above), go to Accounts or Reports."
      - "Open Realized Gain/Loss, Gains & Losses, or Tax Lot Details for the account."
      - "Set date range to full tax year {YYYY} (Jan 1–Dec 31)."
      - "Export or download as CSV where available."
    expected_files:
      - "*realized*gain*loss*.csv"
      - "*gains*losses*.csv"
    drive_folder: "02 - Brokerage 1099s/{Broker}/"
    naming: "{YYYY} Realized Gain Loss - Schwab Acct {suffix}.csv"
notes: "Use account suffix in filenames to distinguish multiple accounts. If UI labels differ, search for Tax Center, Documents, or 1099."
