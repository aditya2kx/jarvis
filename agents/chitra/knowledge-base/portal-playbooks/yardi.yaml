portal: yardi
name: "Yardi (Partnership / K-1)"
url: "TBD — user must provide portal URL"
login_required: true
otp_method: null
automated: true
documents:
  - type: "Schedule K-1"
    nav_steps:
      - "Obtain the exact investor or partnership portal URL from the sponsor or property manager and substitute for url field."
      - "Sign in with issued credentials (username/password or SSO per sponsor)."
      - "Navigate to Documents, Investor Reporting, or Tax Documents."
      - "Select entity {Entity} and tax year {YYYY}."
      - "Download the K-1 package (PDF) for the partnership or LLC."
    expected_files:
      - "*K-1*.pdf"
      - "*Schedule*K-1*.pdf"
    drive_folder: "03 - Partnerships & Rental Properties/{Entity}/"
    naming: "{YYYY} Schedule K-1 - {Entity} - {issuer}.pdf"
  - type: "Distribution records"
    nav_steps:
      - "From the same portal, open Distributions, Capital Activity, or Cash Flow."
      - "Filter to tax year {YYYY}."
      - "Export CSV or PDF of distribution history if available."
    expected_files:
      - "*distribution*.csv"
      - "*distribution*.pdf"
    drive_folder: "03 - Partnerships & Rental Properties/{Entity}/"
    naming: "{YYYY} Distributions - {Entity}.csv"
notes: "Partial automation: URL and auth vary by sponsor; OTP may be email or none. User must supply portal URL and confirm MFA behavior before unattended runs."
