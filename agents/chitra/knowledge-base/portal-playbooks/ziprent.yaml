portal: ziprent
name: "Ziprent"
url: "https://www.ziprent.com"
login_required: true
otp_method: "email"
automated: true
documents:
  - type: "1099-MISC"
    nav_steps:
      - "Open the portal URL and sign in to the owner or landlord dashboard."
      - "Complete email OTP if prompted."
      - "Navigate to Taxes, Documents, or Year-End Statements."
      - "Select tax year {YYYY} and download Form 1099-MISC if issued for rental income reporting."
    expected_files:
      - "*1099*MISC*.pdf"
      - "*1099-MISC*.pdf"
    drive_folder: "03 - Partnerships & Rental Properties/{Property}/"
    naming: "{YYYY} Form 1099-MISC - Ziprent - {Property}.pdf"
  - type: "Transaction History CSV"
    nav_steps:
      - "From Payments, Ledger, or Transactions, set date range to full year {YYYY}."
      - "Export transaction history as CSV."
    expected_files:
      - "*transaction*.csv"
      - "*ledger*.csv"
    drive_folder: "03 - Partnerships & Rental Properties/{Property}/"
    naming: "{YYYY} Transaction History - Ziprent - {Property}.csv"
notes: "Email OTP may delay automation; allow time for inbox delivery. UI paths may be labeled Reports or Owner Portal depending on product version."
