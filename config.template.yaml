# Jarvis Configuration Template
# Copy to config.yaml and fill in your values. config.yaml is gitignored.

auth:
  credentials_path: "~/Library/Application Support/Cursor-Personal/User/google-mcp-auth/.gdrive-server-credentials.json"
  env_path: "~/Library/Application Support/Cursor-Personal/User/google-mcp-auth/.env"

google_sheets:
  tax_tracker_id: "YOUR_TAX_TRACKER_SPREADSHEET_ID"
  iso_tracker_id: "YOUR_ISO_TRACKER_SPREADSHEET_ID"

google_drive:
  taxes_root_id: "YOUR_TAXES_ROOT_FOLDER_ID"
  taxes_year_id: "YOUR_TAXES_YEAR_FOLDER_ID"
  subfolder_ids:
    schwab: "YOUR_SCHWAB_SUBFOLDER_ID"

profile:
  tax_year: 2025
  taxpayer_names:
    - "Taxpayer Name"
    - "Spouse Name"
  filing_status: "MFJ"

paths:
  knowledge_base: "agents/chitra/knowledge-base"
  extracted: "extracted"
  year_data: "agents/chitra/data/2025"

slack:
  workspace: "your-workspace-name"
  bot_token_cmd: "security find-generic-password -a SLACK_BOT_TOKEN -s jarvis -w"
  notification_channel: "#general"
