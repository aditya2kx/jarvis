portal: etrade
name: "E*Trade"
url: "https://us.etrade.com"
login_required: true
otp_method: "sms"
automated: true
documents:
  - type: "Consolidated 1099"
    nav_steps:
      - "Open the portal URL and sign in with user ID and password."
      - "Complete SMS OTP if prompted."
      - "Navigate to Accounts, Documents, or Tax Center."
      - "Open Tax Documents / 1099 and select tax year {YYYY}."
      - "Download the Consolidated 1099 PDF for each account that has activity."
    expected_files:
      - "*Consolidated*1099*.pdf"
      - "*1099*Composite*.pdf"
    drive_folder: "02 - Brokerage 1099s/{Broker}/"
    naming: "{YYYY} Form Consolidated 1099 - ETrade - Acct {suffix}.pdf"
  - type: "Stock Plan Supplement"
    nav_steps:
      - "From the same tax documents area, look for Equity Compensation, Stock Plan, or Supplement."
      - "Select tax year {YYYY}."
      - "Download the Stock Plan Supplement PDF if issued for the account."
    expected_files:
      - "*Stock*Plan*Supplement*.pdf"
      - "*equity*supplement*.pdf"
    drive_folder: "02 - Brokerage 1099s/{Broker}/"
    naming: "{YYYY} Stock Plan Supplement - ETrade - Acct {suffix}.pdf"
  - type: "Tax Statement Availability Notice"
    nav_steps:
      - "In Tax Documents or Messages, locate notices for the tax year."
      - "Download any Tax Statement Availability or similar informational notice PDF."
    expected_files:
      - "*Tax*Statement*Availability*.pdf"
      - "*availability*notice*.pdf"
    drive_folder: "02 - Brokerage 1099s/{Broker}/"
    naming: "{YYYY} Tax Statement Availability Notice - ETrade - Acct {suffix}.pdf"
notes: "Multiple accounts may exist; repeat per account. TOD or low-activity accounts may have no documents—confirm zero activity before skipping."
