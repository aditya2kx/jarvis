portal: fidelity
name: "Fidelity"
url: "https://digital.fidelity.com"
login_required: true
otp_method: "sms"
automated: true
documents:
  - type: "1099-R (if distributions)"
    nav_steps:
      - "Open the portal URL and sign in."
      - "Complete SMS OTP if prompted."
      - "Navigate to Accounts & Trade, Statements, or Tax Forms."
      - "Filter to tax year {YYYY} and locate Form 1099-R for retirement distributions."
      - "Download the 1099-R PDF only if distributions occurred; otherwise note no 1099-R for the year."
    expected_files:
      - "*1099-R*.pdf"
    drive_folder: "06 - Retirement Accounts/{Provider}/"
    naming: "{YYYY} Form 1099-R - Fidelity - Acct {suffix}.pdf"
  - type: "Account confirmation"
    nav_steps:
      - "From Statements or Account Documents, open year-end or annual account confirmation for {YYYY}."
      - "Download or save the confirmation PDF if required for records."
    expected_files:
      - "*confirmation*.pdf"
      - "*statement*annual*.pdf"
    drive_folder: "06 - Retirement Accounts/{Provider}/"
    naming: "{YYYY} Account Confirmation - Fidelity - Acct {suffix}.pdf"
notes: "1099-R appears only when reportable distributions exist; IRA/401k flows may differ by account type."
