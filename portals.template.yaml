# Portal Credentials Template
# Copy to portals.yaml and fill in your values. This file is gitignored.
#
# Passwords are retrieved from macOS Keychain at runtime — never stored in plaintext.
# To add a password to Keychain:
#   security add-generic-password -s <service_name> -a <username> -w <password>
# To verify:
#   security find-generic-password -s <service_name> -w
#
# OTP is always interactive via Slack — never stored or automated.

slack:
  bot_token_env: "SLACK_BOT_TOKEN"
  user_id: "YOUR_SLACK_USER_ID"

portals:
  schwab:
    name: "Charles Schwab"
    url: "https://client.schwab.com/Login/SignOn"
    username: "YOUR_USERNAME"
    password_cmd: "security find-generic-password -s schwab-tax -w"
    otp_method: "sms"
    documents:
      - "1099 Composite"
      - "Realized Gain/Loss CSV"

  etrade:
    name: "E*Trade"
    url: "https://us.etrade.com/e/t/user/login"
    username: "YOUR_USERNAME"
    password_cmd: "security find-generic-password -s etrade-tax -w"
    otp_method: "sms"
    documents:
      - "Consolidated 1099"
      - "Stock Plan Supplement"

  robinhood:
    name: "Robinhood"
    url: "https://robinhood.com/login"
    username: "YOUR_USERNAME"
    password_cmd: "security find-generic-password -s robinhood-tax -w"
    otp_method: "sms"
    documents:
      - "Consolidated 1099"

  fidelity:
    name: "Fidelity"
    url: "https://digital.fidelity.com/prgw/digital/login/full-page"
    username: "YOUR_USERNAME"
    password_cmd: "security find-generic-password -s fidelity-tax -w"
    otp_method: "sms"
    documents:
      - "1099-R (if distributions)"
      - "Account confirmation"

  wells_fargo:
    name: "Wells Fargo"
    url: "https://connect.secure.wellsfargo.com/auth/login/present"
    username: "YOUR_USERNAME"
    password_cmd: "security find-generic-password -s wellsfargo-tax -w"
    otp_method: "sms"
    documents:
      - "Form 1098"

  jpmorgan_chase:
    name: "JPMorgan Chase"
    url: "https://secure.chase.com"
    username: "YOUR_USERNAME"
    password_cmd: "security find-generic-password -s chase-tax -w"
    otp_method: "sms"
    documents:
      - "Form 1098"

  ziprent:
    name: "Ziprent"
    url: "https://www.ziprent.com/login"
    username: "YOUR_USERNAME"
    password_cmd: "security find-generic-password -s ziprent-tax -w"
    otp_method: "email"
    documents:
      - "1099-MISC"
      - "Transaction History CSV"

  # Public portals (no login required)
  fort_bend_county:
    name: "Fort Bend County Tax Assessor"
    url: "https://www.fortbendcountytx.gov/government/departments/tax-assessor-collector"
    login_required: false
    documents:
      - "Property Tax Bill"

  san_mateo_county:
    name: "San Mateo County Tax Collector"
    url: "https://sanmateo.taxcollector.com/"
    login_required: false
    documents:
      - "Property Tax Bill"

  # CPA-managed portals (CHITRA does not automate)
  chase_business:
    name: "Chase Business"
    url: "https://secure.chase.com"
    automated: false
    reason: "CPA has direct portal access"

  homebase:
    name: "Homebase"
    url: "https://app.joinhomebase.com"
    automated: false
    reason: "CPA has direct portal access for W-2, W-3, Employer Taxes Summary"
