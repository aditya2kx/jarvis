display_information:
  name: __AGENT_NAME__
  description: __AGENT_DESCRIPTION__
  background_color: "#7B1FA2"
features:
  bot_user:
    display_name: __AGENT_NAME__
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - chat:write.customize
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - groups:history
      - groups:read
      - mpim:history
      - mpim:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
